<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <title>Demo</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/css/common/variables.css"/>
    <link rel="stylesheet" href="/css/common/layout.css"/>
    <link rel="stylesheet" href="/css/common/components.css"/>
    <link rel="stylesheet" href="/css/pages/login.css"/>
</head>
<body>
<div class="page-center">
    <div class="container-box">
        <div class="card login-card">
            <div class="login-title">
                <div class="login-badge">N</div>
                <h1>Social Login</h1>
                <p>간편하게 로그인하세요</p>
            </div>

            <div class="unauthenticated">
                <div class="social-list">
                    <a class="social-btn naver-btn">
                        <span>K</span> 네이버 로그인
                    </a>
                    <a class="social-btn kakao-btn">
                        <span>K</span> 카카오 로그인
                    </a>
                    <a class="social-btn google-btn">
                        <span>K</span> 구글 로그인
                    </a>
                </div>
            </div>

            <div class="authenticated" style="display:none">
                <div class="welcome-box">
                    <div class="welcome-label">Logged in as</div>
                    <div class="welcome-user"><span id="user"></span></div>
                </div>

                <div class="action-group">
                    <button onclick="refreshToken()" class="btn btn-primary-custom">로그인 연장</button>
                    <button onclick="logout()" class="btn btn-light-custom">로그아웃</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function showAuthenticated(userName) {
        document.querySelectorAll(".unauthenticated").forEach(el => {
            el.style.display = "none";
        });
        document.querySelector(".authenticated").style.display = "block";
        document.getElementById("user").innerText = userName;
    }

    function showUnauthenticated() {
        document.querySelectorAll(".unauthenticated").forEach(el => {
            el.style.display = "block";
        });
        document.querySelector(".authenticated").style.display = "none";
        document.getElementById("user").innerText = "";
    }

    async function getMe() {
        return await fetch("/api/user/me", {
            method: "GET",
            credentials: "include"
        });
    }

    async function tryRefresh() {
        return await fetch("/api/auth/refresh", {
            method: "GET",
            credentials: "include"
        });
    }

    async function loadUser() {
        try {
            let response = await getMe();
            console.log(response);

            if (response.status === 401) {
                const refreshResponse = await tryRefresh();

                if (!refreshResponse.ok) {
                    showUnauthenticated();
                    return;
                }

                response = await getMe();
            }

            if (!response.ok) {
                showUnauthenticated();
                return;
            }

            const data = await response.json();
            console.log("me =", data);

            const user = data.response?.name || data.name || "사용자";
            showAuthenticated(user);

        } catch (error) {
            console.error("로그인 상태 확인 실패:", error);
            showUnauthenticated();
        }
    }

    window.onload = async function () {
        await loadUser();
    };

    async function refreshToken() {
        try {
            const response = await fetch("/api/auth/refresh", {
                method: "GET",
                credentials: "include"
            });

            if (!response.ok) {
                showUnauthenticated();
                window.location.href = "/";
                return;
            }

            await loadUser();

        } catch (error) {
            console.error("refresh 실패:", error);
            showUnauthenticated();
        }
    }

    async function logout() {
        try {
            const response = await fetch("/api/user/logout", {
                method: "GET",
                credentials: "include"
            });

            if (response.ok) {
                showUnauthenticated();
                window.location.href = "/";
            }
        } catch (error) {
            console.error("로그아웃 실패:", error);
        }
    }
</script>
</body>
</html>
